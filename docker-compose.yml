services:
  digestly:
    build: .
    image: digestly:latest
    container_name: digestly
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Pinned here so the container always uses the mounted volume + baked-in assets,
      # regardless of any DATA_DIR/STATIC_DIR a developer sets in .env for local `cargo run`.
      # (compose `environment:` overrides `env_file:`.)
      DATA_DIR: /data
      STATIC_DIR: /app/static
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: ${RUST_LOG:-info,digestly=debug}
    volumes:
      - ./data:/data
    # Give in-flight writes time to flush on `docker compose stop` (graceful SIGTERM).
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "digestly", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
