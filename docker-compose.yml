services:
  digestly:
    build: .
    image: digestly:latest
    container_name: digestly
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Pinned here so the container always uses the mounted volume + baked-in assets,
      # regardless of any DATA_DIR/STATIC_DIR a developer sets in .env for local `cargo run`.
      # (compose `environment:` overrides `env_file:`.)
      DATA_DIR: /data
      STATIC_DIR: /app/static
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: ${RUST_LOG:-info,digestly=debug}
    volumes:
      - digestly-data:/data
    # Give in-flight writes time to flush on `docker compose stop` (graceful SIGTERM).
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "digestly", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  digestly-data:
    # Named volume keeps SQLite on native ext4 inside the Linux VM, avoiding
    # macOS virtiofs mmap-coherence issues that cause SQLITE_IOERR_SHORT_READ
    # (error 522) on WAL-mode databases. Bind mounts (./data:/data) go through
    # virtiofs, which is known-flaky for SQLite under Docker Desktop on macOS.
    # ----------------------------------------
    # Migration from a bind mount:
    #   1. docker compose down
    #   2. docker compose up -d  (creates empty named volume)
    #   3. docker cp ./data/digestly.db digestly:/data/digestly.db
    #   4. docker cp ./data/digestly.db-wal digestly:/data/digestly.db-wal  (if exists)
    #   5. docker cp ./data/digestly.db-shm digestly:/data/digestly.db-shm  (if exists)
    #   6. docker compose restart
