name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        run: cargo fmt --manifest-path backend/Cargo.toml --all -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path backend/Cargo.toml --all-targets --all-features --locked -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path backend/Cargo.toml --all-targets --all-features --locked

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run read-only frontend checks
        working-directory: web
        run: pnpm run ci

      - name: Build frontend
        working-directory: web
        run: pnpm run build

      - name: Run frontend tests
        working-directory: web
        run: pnpm test

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: web
        run: pnpm run build

      - name: Build backend
        run: cargo build --release --manifest-path backend/Cargo.toml --locked

      - name: Install Playwright browsers
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: web
        run: pnpm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
