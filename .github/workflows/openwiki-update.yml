name: OpenWiki Update

on:
    workflow_dispatch:
    schedule:
        - cron: "0 8 * * *"

permissions:
    contents: write
    pull-requests: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install OpenWiki
              run: npm install --global openwiki

            - name: Run OpenWiki with model fallback
              run: |
                  MODELS=(
                    "meta-llama/llama-3.3-70b-instruct"
                    "deepseek/deepseek-chat"
                    "deepseek/deepseek-r1-distill-llama-70b"
                  )
                  for model in "${MODELS[@]}"; do
                    echo "Trying model: $model"
                    if OPENWIKI_MODEL_ID="$model" openwiki code --update --print; then
                      echo "Success with $model"
                      exit 0
                    fi
                    echo "Failed with $model, trying next..."
                  done
                  echo "All models failed"
                  exit 1
              env:
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

            - name: Create OpenWiki update pull request
              uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
              with:
                  add-paths: |
                      openwiki
                      AGENTS.md
                      CLAUDE.md
                      .github/workflows/openwiki-update.yml
                  branch: openwiki/update
                  commit-message: "docs: update OpenWiki"
                  title: "docs: update OpenWiki"
                  body: |
                      Automated OpenWiki documentation update.

                      This PR was generated by the scheduled OpenWiki workflow.
